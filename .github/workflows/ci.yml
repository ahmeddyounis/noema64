name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Format check
        run: |
          gofmt -w ./cmd ./internal
          git diff --exit-code
      - name: Go vet and tests
        run: |
          go list ./... | grep -v '/cmd/noema64-gui$' | xargs go vet
          go list ./... | grep -v '/cmd/noema64-gui$' | xargs go test
      - name: Race tests
        run: |
          go list ./... | grep -v '/cmd/noema64-gui$' | xargs go test -race
      - name: Frontend smoke
        run: npm --prefix cmd/noema64-gui/frontend test
      - name: Protocol and trace gates
        run: make uci-smoke trace-validate perft
      - name: Dependency license gate
        run: make license-check
      - name: Reliability benchmark
        run: make bench-random
      - name: Build CLI and UCI binaries
        run: make build-cli build-uci build-bench
